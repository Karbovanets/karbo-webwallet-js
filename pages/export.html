<img src="./assets/img/logo_vertical.png" id="verticalLogo" style="display: none;"/>
<canvas id="canvasExport" style="display: none;"></canvas>

<div id="app" class="body-root" v-cloak="">
	<div class="body-header">
		<div class="header-title">
			<i class="fa fa-download" aria-hidden="true"></i> {{ $t("exportPage.title") }}
		</div>
	</div>

	<!-- Public Address -->
	<div class="card">
		<div class="card-title">{{ $t("exportPage.publicAddressBlock.title") }}</div>
		<div style="font-family:monospace;font-size:0.75rem;word-break:break-all;color:var(--color-text);">{{publicAddress}}</div>
	</div>

	<!-- PDF Export -->
	<div class="card" v-if="!nativePlatform">
		<div class="card-title">{{ $t("exportPage.pdfBlock.title") }}</div>
		<button @click="exportEncryptedPdf()" class="btn primary" style="width:100%;">{{ $t("exportPage.pdfBlock.downloadButton") }}</button>
	</div>

	<!-- Warning -->
	<div class="card" style="background:transparent;border-color:var(--color-border);">
		<div class="card-title">{{ $t("exportPage.warningBlock.title") }}</div>
		<div style="color:var(--color-text-muted);font-size:0.8125rem;line-height:1.6;" v-html="$t('exportPage.warningBlock.content')"></div>
	</div>

	<!-- Export Keys -->
	<div class="card">
		<div class="card-title">{{ $t("exportPage.exportBlock.title") }}</div>
		<div style="display:flex;flex-direction:column;gap:0.5rem;">
			<button class="btn" style="width:100%;" @click="getPrivateKeys()">{{ $t("exportPage.exportBlock.privateKeysButton") }}</button>
			<button class="btn" style="width:100%;" @click="getMnemonicPhrase()">{{ $t("exportPage.exportBlock.mnemonicKeysButton") }}</button>
			<button class="btn" style="width:100%;" v-if="!nativePlatform" @click="fileExport()">{{ $t("exportPage.exportBlock.fileButton") }}</button>
		</div>
	</div>
</div>
