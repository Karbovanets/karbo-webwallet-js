<div id="app" class="body-root" v-cloak="">
	<div class="body-header">
		<div class="header-title">{{ $t("importFromFilePage.title") }}</div>
		<div class="header-subtitle">{{ $t("importFromFilePage.subtitle") }}</div>
	</div>

	<div class="card">
		<div class="card-title">{{ $t("importBasePage.parametersBlock.title") }}</div>
		<div class="field">
			<label>{{ $t("importBasePage.parametersBlock.password.label") }}</label>
			<input type="password" v-model="password">
			<div v-if="insecurePassword && !forceInsecurePassword" class="message error">
				{{ $t("global.passwordInvalidRequirements") }}
				<div class="tc" style="margin-top:0.5rem;">
					<button @click="forceInsecurePasswordCheck()" class="btn mini">{{ $t("global.disableSecurity") }}</button>
				</div>
			</div>
		</div>
		<div class="field">
			<label>{{ $t("importBasePage.parametersBlock.passwordConfirm.label") }}</label>
			<input type="password" v-model="password2">
			<div v-if="password != '' && password2 != '' && password != password2" class="message error">
				{{ $t("importBasePage.parametersBlock.passwordConfirm.invalid") }}
			</div>
		</div>
	</div>

	<div class="card">
		<div class="card-title">{{ $t("importFromFilePage.walletBlock.title") }}</div>
		<div class="tc">
			<button class="btn" style="width:100%;" @click="selectFile()">{{ $t("importFromFilePage.walletBlock.label") }}</button>
		</div>
		<div class="tc" style="margin-top:0.75rem;">
			<button @click="importWallet()" class="btn primary" style="width:100%;" :disabled="!formValid()">{{ $t("importFromFilePage.walletBlock.importButton") }}</button>
		</div>
	</div>
</div>
