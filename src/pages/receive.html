<div id="app" class="body-root receiveTab" v-cloak="">
	<div class="body-header">
		<div class="header-title">
			<i class="fa fa-qrcode" aria-hidden="true"></i> {{ $t("receivePage.title") }}
		</div>
	</div>

	<!-- QR Code Display -->
	<div class="card" style="text-align:center;padding:1.5rem 1rem;">
		<div class="qrCode">
			<div id="qrCodeContainer"></div>
		</div>
	</div>

	<!-- Address -->
	<div class="card">
		<div class="card-title">{{ $t("receivePage.receiveBlock.address.title") }}</div>
		<div class="field">
			<div class="subfield readonly">
				<input type="text" v-model="rawAddress" id="rawAddress" readonly="readonly" style="font-size:0.75rem;font-family:monospace;"/>
				<span class="action" @click="setInClipboard()"><i class="fa fa-copy"></i></span>
			</div>
		</div>
	</div>

	<!-- Optional QR customization -->
	<div class="card">
		<div class="card-title">{{ $t("receivePage.receiveBlock.qrCode.title") }}</div>
		<div class="field">
			<label>{{ $t("receivePage.receiveBlock.qrCode.labelAmount") }}</label>
			<input type="text" v-model="amount" placeholder="0.00"/>
		</div>
		<div class="field">
			<label>{{ $t("receivePage.receiveBlock.qrCode.labelRecipient") }}</label>
			<input type="text" v-model="recipientName"/>
		</div>
		<div class="field">
			<label>{{ $t("receivePage.receiveBlock.qrCode.labelDescription") }}</label>
			<input type="text" v-model="txDescription"/>
		</div>
		<button class="btn primary" style="width:100%;" @click="generateQrCode()">{{ $t("receivePage.receiveBlock.qrCode.updateButton") }}</button>
	</div>

	<img src="./assets/img/logo.png" id="qrCodeLogo" style="display:none;"/>

	<div class="card" v-if="hasNfc && hasWritableNfc">
		<div class="card-title">NFC</div>
		<div style="display:flex;gap:0.5rem;">
			<button @click="shareWithNfc()" class="btn primary" style="flex:1;">Share by NFC</button>
			<button @click="writeOnNfc()" class="btn basic" style="flex:1;">Write NFC Tag</button>
		</div>
	</div>
</div>
